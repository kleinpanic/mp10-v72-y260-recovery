name: Firmware CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"
      - "firmware-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firmware-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify firmware artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out firmware repo
        uses: actions/checkout@v7

      - name: Fetch official MP10 v72 source image
        run: |
          git clone --depth 1 https://github.com/Monoprice3DP/MP10Firmware72.git "$RUNNER_TEMP/MP10Firmware72"
          sha256sum "$RUNNER_TEMP/MP10Firmware72/MA10v72/update.bin"

      - name: Verify reproducible firmware output
        env:
          MP10_OFFICIAL_UPDATE_BIN: ${{ runner.temp }}/MP10Firmware72/MA10v72/update.bin
          MP10_BUILD_DIR: build/firmware
        run: scripts/verify_release_artifacts.sh

      - name: Upload firmware build artifact
        uses: actions/upload-artifact@v6
        with:
          name: mp10-v72-y260-firmware
          path: |
            build/firmware/custom_update.bin
            build/firmware/update.bin
            build/firmware/manifest.json
            build/firmware/manifest.md
            build/firmware/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Check out firmware repo
        uses: actions/checkout@v7

      - name: Fetch official MP10 v72 source image
        run: |
          git clone --depth 1 https://github.com/Monoprice3DP/MP10Firmware72.git "$RUNNER_TEMP/MP10Firmware72"

      - name: Build release assets
        env:
          MP10_OFFICIAL_UPDATE_BIN: ${{ runner.temp }}/MP10Firmware72/MA10v72/update.bin
          MP10_BUILD_DIR: build/firmware
        run: scripts/verify_release_artifacts.sh

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            build/firmware/custom_update.bin \
            build/firmware/update.bin \
            build/firmware/manifest.json \
            build/firmware/manifest.md \
            build/firmware/SHA256SUMS.txt \
            --title "$TAG_NAME" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
